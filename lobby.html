<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW2019 Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
        }

        header {
            background-color: #333;
            padding: 10px;
        }

        h1 {
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: space-around;
            background-color: #222;
            padding: 10px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #555;
        }

        section {
            padding: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Modern Warfare 2019</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Campaign</a>
        <a href="#">Multiplayer</a>
        <a href="#">Co-op</a>
    </nav>
    <section>
        <!-- Your content goes here -->
        <p>Welcome to the MW2019 main menu!</p>
    </section>
</body>

</html>
