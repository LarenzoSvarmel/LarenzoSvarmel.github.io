<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MW2019 Menu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #1a1a1a;
      color: #fff;
    }

    header {
      background-color: #333;
      padding: 10px;
      text-align: center;
      font-size: 24px;
      color: #4CAF50;
    }

    nav {
      display: flex;
      justify-content: space-around;
      background-color: #333;
      padding: 10px;
      border-bottom: 2px solid #4CAF50;
    }

    nav a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    nav a:hover {
      background-color: #4CAF50;
    }

    main {
      padding: 20px;
      text-align: center;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <header>
    <h1>Call of Duty: Modern Warfare</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Multiplayer</a>
    <a href="#">Campaign</a>
    <a href="#">Co-op</a>
    <a href="#">Settings</a>
  </nav>

  <main>
    <h2>Welcome to the Lobby</h2>
    <p>Choose your mode and get ready for action!</p>
    <button>Start Game</button>
  </main>

</body>
</html>
