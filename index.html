<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        #chat-container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #messages {
            height: 300px;
            overflow-y: scroll;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
            padding-bottom: 10px;
        }

        #message-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
    <title>Chatroom</title>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="message-input" placeholder="Type your message..." onkeydown="sendMessage(event)">
    </div>

    <script>
        let username = prompt("Enter your username:");
        document.getElementById("messages").innerHTML += `<div><strong>${username}:</strong> joined the chat</div>`;

        function sendMessage(event) {
            if (event.key === "Enter") {
                const messageInput = document.getElementById("message-input");
                const message = messageInput.value.trim();

                if (message !== "") {
                    document.getElementById("messages").innerHTML += `<div><strong>${username}:</strong> ${message}</div>`;
                    messageInput.value = "";
                    messageInput.focus();
                }
            }
        }
    </script>
</body>
</html>
