<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movement</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="aiCanvas"></canvas>

    <script>
        const canvas = document.getElementById('aiCanvas');
        const ctx = canvas.getContext('2d');

        const ai = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            angle: 0,
            speed: 2,
            isMoving: false,
            targetX: 0,
            targetY: 0,
        };

        function drawAI() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw AI dot
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(ai.x, ai.y, ai.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw arrow indicating AI direction
            ctx.save();
            ctx.translate(ai.x, ai.y);
            ctx.rotate(ai.angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(ai.size * 2, 0);
            ctx.lineTo(ai.size * 1.8, ai.size * 0.2);
            ctx.lineTo(ai.size * 1.8, -ai.size * 0.2);
            ctx.closePath();
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.restore();

            // Draw line if AI is moving
            if (ai.isMoving) {
                ctx.beginPath();
                ctx.moveTo(ai.x, ai.y);
                ctx.lineTo(ai.targetX, ai.targetY);
                ctx.strokeStyle = 'gray';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function updateAI() {
            if (ai.isMoving) {
                const dx = ai.targetX - ai.x;
                const dy = ai.targetY - ai.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > ai.speed) {
                    ai.x += (dx / distance) * ai.speed;
                    ai.y += (dy / distance) * ai.speed;
                } else {
                    ai.isMoving = false;
                }

                ai.angle = Math.atan2(dy, dx);
            }
        }

        function onMouseDown(event) {
            ai.isMoving = true;
            ai.targetX = event.clientX - canvas.getBoundingClientRect().left;
            ai.targetY = event.clientY - canvas.getBoundingClientRect().top;
        }

        function onMouseUp() {
            ai.isMoving = false;
        }

        function onMouseMove(event) {
            if (ai.isMoving) {
                ai.targetX = event.clientX - canvas.getBoundingClientRect().left;
                ai.targetY = event.clientY - canvas.getBoundingClientRect().top;
            }
        }

        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('mousemove', onMouseMove);

        function gameLoop() {
            updateAI();
            drawAI();
            requestAnimationFrame(gameLoop);
        }

        // Adjust canvas size based on the window size
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawAI();
        });

        // Initial setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameLoop();
    </script>
</body>
</html>
