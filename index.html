<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raycasting Engine</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: auto;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');

    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;

    canvas.width = screenWidth;
    canvas.height = screenHeight;

    class Vector3 {
      constructor(x, y, z) {
        this.x = x;
        this.y = y;
        this.z = z;
      }

      add(vector) {
        return new Vector3(this.x + vector.x, this.y + vector.y, this.z + vector.z);
      }

      subtract(vector) {
        return new Vector3(this.x - vector.x, this.y - vector.y, this.z - vector.z);
      }

      multiplyScalar(scalar) {
        return new Vector3(this.x * scalar, this.y * scalar, this.z * scalar);
      }

      cross(vector) {
        return new Vector3(
          this.y * vector.z - this.z * vector.y,
          this.z * vector.x - this.x * vector.z,
          this.x * vector.y - this.y * vector.x
        );
      }
    }

    class Matrix4 {
      constructor() {
        this.elements = new Array(16).fill(0);
      }

      set(row, col, value) {
        this.elements[row * 4 + col] = value;
      }

      static identity() {
        const matrix = new Matrix4();
        for (let i = 0; i < 4; i++) {
          matrix.set(i, i, 1);
        }
        return matrix;
      }

      static perspective(fov, aspect, near, far) {
        const matrix = new Matrix4();
        const tanHalfFov = Math.tan(fov / 2);
        matrix.set(0, 0, 1 / (tanHalfFov * aspect));
        matrix.set(1, 1, 1 / tanHalfFov);
        matrix.set(2, 2, (near + far) / (near - far));
        matrix.set(2, 3, (2 * near * far) / (near - far));
        matrix.set(3, 2, -1);
        return matrix;
      }

      multiply(vector) {
        const result = new Vector3(
          this.elements[0] * vector.x + this.elements[4] * vector.y + this.elements[8] * vector.z + this.elements[12],
          this.elements[1] * vector.x + this.elements[5] * vector.y + this.elements[9] * vector.z + this.elements[13],
          this.elements[2] * vector.x + this.elements[6] * vector.y + this.elements[10] * vector.z + this.elements[14]
        );
        const w = this.elements[3] * vector.x + this.elements[7] * vector.y + this.elements[11] * vector.z + this.elements[15];
        return result.multiplyScalar(1 / w);
      }
    }

    class Camera {
      constructor(position, rotation, fov, aspect, near, far) {
        this.position = position;
        this.rotation = rotation;
        this.projectionMatrix = Matrix4.perspective(fov, aspect, near, far);
      }

      getViewMatrix() {
        const rotationMatrix = new Matrix4();
        rotationMatrix.set(0, 0, Math.cos(this.rotation.y));
        rotationMatrix.set(0, 2, -Math.sin(this.rotation.y));
        rotationMatrix.set(2, 0, Math.sin(this.rotation.y));
        rotationMatrix.set(2, 2, Math.cos(this.rotation.y));

        const translationMatrix = new Matrix4();
        translationMatrix.set(0, 3, -this.position.x);
        translationMatrix.set(1, 3, -this.position.y);
        translationMatrix.set(2, 3, -this.position.z);

        return rotationMatrix.multiply(translationMatrix);
      }
    }

    const camera = new Camera(new Vector3(2, 1, 5), new Vector3(0, 0, 0), Math.PI / 3, screenWidth / screenHeight, 0.1, 100);

    const gridSize = 10;
    const tileSize = 1;
    const map = new Array(gridSize).fill(0).map(() => new Array(gridSize).fill(0));

    // Populate the map with a simple grid
    for (let i = 0; i < gridSize; i++) {
      for (let j = 0; j < gridSize; j++) {
        map[i][j] = Math.random() < 0.8 ? 0 : 1;
      }
    }

    function drawMap() {
      ctx.strokeStyle = 'gray';
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          if (map[i][j] === 1) {
            ctx.strokeRect(i * tileSize * 2, j * tileSize * 2, tileSize * 2, tileSize * 2);
          }
        }
      }
    }

    function project(vertex, viewMatrix, projectionMatrix) {
      const viewProjectionMatrix = projectionMatrix.multiply(viewMatrix);
      const transformedVertex = viewProjectionMatrix.multiply(vertex);
      return {
        x: (transformedVertex.x + 1) * screenWidth / 2,
        y: (1 - transformedVertex.y) * screenHeight / 2,
      };
    }

    function castRay(mouseX, mouseY) {
      const normalizedX = (mouseX / screenWidth) * 2 - 1;
      const normalizedY = 1 - (mouseY / screenHeight) * 2;

      const rayClip = new Vector3(normalizedX, normalizedY, -1);
      const rayEye = camera.projectionMatrix.multiply(rayClip);

      rayEye.z = -1;
      rayEye.w = 0;

      const rayWorld = camera.getViewMatrix().multiply(rayEye);
      rayWorld.normalize();

      return rayWorld;
    }

    function findWallHit(ray) {
      const stepSize = 0.1;

      let position = new Vector3(camera.position.x, camera.position.y, camera.position.z);

      for (let step = 0; step < 30; step++) {
        position = position.add(ray.multiplyScalar(stepSize));

        const gridX = Math.floor(position.x / (tileSize * 2));
        const gridY = Math.floor(position.z / (tileSize * 2));

        if (gridX >= 0 && gridX < gridSize && gridY >= 0 && gridY < gridSize && map[gridX][gridY] === 1) {
          return { x: gridX, y: gridY };
        }
      }

      return null;
    }

    function drawHighlightedWall(hit) {
      if (hit) {
        ctx.fillStyle = 'red';
        ctx.fillRect(hit.x * tileSize * 2, hit.y * tileSize * 2, tileSize * 2, tileSize * 2);
      }
    }

    function handleMouseMove(event) {
      const ray = castRay(event.clientX, event.clientY);
      const hit = findWallHit(ray);

      draw();
      drawHighlightedWall(hit);
    }

    document.addEventListener('mousemove', handleMouseMove);

    function handleKeyPress(event) {
      const speed = 0.1;
      switch (event.key) {
        case 'ArrowUp':
          camera.position.z -= speed;
          break;
        case 'ArrowDown':
          camera.position.z += speed;
          break;
        case 'ArrowLeft':
          camera.position.x -= speed;
          break;
        case 'ArrowRight':
          camera.position.x += speed;
          break;
      }
    }

    document.addEventListener('keydown', handleKeyPress);

    function update() {
      draw();
      requestAnimationFrame(update);
    }

    function draw() {
      ctx.clearRect(0, 0, screenWidth, screenHeight);
      drawMap();
    }

    update();
  </script>
</body>
</html>
