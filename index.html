<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raycasting Demo WebGL</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="raycastingCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('raycastingCanvas');
    const gl = canvas.getContext('webgl');

    if (!gl) {
      console.error('Unable to initialize WebGL. Your browser may not support it.');
    }

    const vertexShaderSource = `
      attribute vec2 a_position;
      void main() {
        gl_Position = vec4(a_position, 0, 1);
      }
    `;

    const fragmentShaderSource = `
      precision mediump float;
      uniform vec2 u_resolution;
      uniform float u_time;
      uniform sampler2D u_wallTexture;

      // Map representation (1: wall, 0: empty)
      const int map[8][8] = int[8](int[8](1,0,0,0,0,0,0,1), int[8](1,0,1,0,0,1,0,1), int[8](1,0,1,0,0,1,0,1), int[8](1,0,1,0,0,1,0,1), int[8](1,0,1,0,0,1,0,1), int[8](1,0,1,0,0,1,0,1), int[8](1,0,0,0,0,0,0,1), int[8](1,1,1,1,1,1,1,1));

      void main() {
        vec2 uv = (gl_FragCoord.xy - u_resolution / 2.0) / min(u_resolution.x, u_resolution.y);
        uv.x *= u_resolution.x / u_resolution.y;

        vec3 color = vec3(0.0);

        // Raycasting logic
        float angle = atan(uv.x, uv.y) + u_time;
        vec2 rayDirection = vec2(cos(angle), sin(angle));

        vec2 rayPosition = vec2(1.0, 1.0);  // Start ray position
        float deltaDist = 0.01;  // Step size for ray marching
        float maxDist = 20.0;    // Maximum distance to check for collisions

        for (int i = 0; i < 200; i++) {
          // Check if the ray hits a wall
          int mapX = int(rayPosition.x);
          int mapY = int(rayPosition.y);

          if (mapX >= 0 && mapY >= 0 && mapX < 8 && mapY < 8 && map[mapY][mapX] == 1) {
            // Calculate distance to the wall
            float distance = length(rayPosition - vec2(1.0, 1.0));

            // Map distance to color (fake shading)
            color = vec3(1.0 - smoothstep(1.0, 2.0, distance));
            break;
          }

          // Move the ray forward
          rayPosition += rayDirection * deltaDist;

          // Break if we're beyond the maximum distance
          if (length(rayPosition - vec2(1.0, 1.0)) > maxDist) {
            break;
          }
        }

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
    const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
    const program = createProgram(gl, vertexShader, fragmentShader);

    const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
    const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
    const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
    const wallTextureUniformLocation = gl.getUniformLocation(program, 'u_wallTexture');

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    setRectangle(gl, 0, 0, canvas.width, canvas.height);

    const texture = gl.createTexture();
    const wallImage = new Image();
    wallImage.src = 'path/to/your/wall_texture.jpg';  // Replace with your wall texture path
    wallImage.onload = () => {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, wallImage);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.uniform1i(wallTextureUniformLocation, 0);
    };

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);

    gl.enableVertexAttribArray(positionAttributeLocation);
    const size = 2;
    const type = gl.FLOAT;
    const normalize = false;
    const stride = 0;
    const offset = 0;
    gl.vertexAttribPointer(positionAttributeLocation, size, type, normalize, stride, offset);

    gl.useProgram(program);
    gl.uniform2f(resolutionUniformLocation, canvas.width, canvas.height);

    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.viewport(0, 0, canvas.width, canvas.height);

    gl.bindVertexArray(vao);

    let time = 0.0;

    function update() {
      time += 0.01;
      gl.uniform1f(timeUniformLocation, time);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
      requestAnimationFrame(update);
    }

    update();

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    function createProgram(gl, vertexShader, fragmentShader) {
      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program linking error:', gl.getProgramInfoLog(program));
        gl.deleteProgram(program);
        return null;
      }
      return program;
    }

    function setRectangle(gl, x, y, width, height) {
      const x1 = x;
      const x2 = x + width;
      const y1 = y;
      const y2 = y + height;
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([x1, y1, x2, y1, x1, y2, x1, y2, x2, y1, x2, y2]), gl.STATIC_DRAW);
    }
  </script>
</body>
</html>
