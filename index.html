<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point and Click Adventure</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 50px;
        }

        .scene {
            display: none;
        }

        #scene1, #scene2 {
            cursor: pointer;
            border: 2px solid #000;
            padding: 10px;
            margin: 10px;
            display: inline-block;
        }

        #doorImg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div id="scene1" class="scene" onclick="enterRoom()">
    <h1>Scene 1: Click the Picture</h1>
    <img id="doorImg" src="door.jpg" alt="Accessible Door Image">
    <p>Click the picture to enter the room.</p>
</div>

<div id="scene2" class="scene">
    <h1>Scene 2: Room</h1>
    <p>You've entered the room!</p>
</div>

<script>
    function enterRoom() {
        document.getElementById('scene1').style.display = 'none';
        document.getElementById('scene2').style.display = 'block';
    }
</script>

</body>
</html>
