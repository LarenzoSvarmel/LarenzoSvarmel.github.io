<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #aiContainer {
            position: relative;
            width: 80vmin; /* Adjust the size as needed */
            height: 80vmin; /* Adjust the size as needed */
            background-color: #fff;
            border: 2px solid #000;
            border-radius: 50%;
        }

        #aiDot {
            position: absolute;
            width: 20px; /* Adjust the size of the AI dot */
            height: 20px; /* Adjust the size of the AI dot */
            background-color: blue;
            border-radius: 50%;
            transform-origin: 50% 50%;
        }

        #arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid red; /* Adjust the arrow color */
            transform-origin: 50% 0;
        }
    </style>
</head>
<body>
    <div id="aiContainer">
        <div id="aiDot"></div>
        <div id="arrow"></div>
    </div>

    <script>
        const aiContainer = document.getElementById('aiContainer');
        const aiDot = document.getElementById('aiDot');
        const arrow = document.getElementById('arrow');

        let posX = aiContainer.offsetWidth / 2;
        let posY = aiContainer.offsetHeight / 2;
        let rotation = 0;

        function updatePosition() {
            aiDot.style.transform = `translate(-50%, -50%) translate(${posX}px, ${posY}px)`;
            arrow.style.transform = `rotate(${rotation}deg) translate(-50%, -100%)`;
        }

        function moveAI(event) {
            const bounds = aiContainer.getBoundingClientRect();
            const mouseX = event.clientX - bounds.left;
            const mouseY = event.clientY - bounds.top;

            posX = Math.max(0, Math.min(bounds.width, mouseX));
            posY = Math.max(0, Math.min(bounds.height, mouseY));

            rotation = Math.atan2(mouseY - bounds.height / 2, mouseX - bounds.width / 2) * (180 / Math.PI);

            updatePosition();
        }

        aiContainer.addEventListener('mousemove', moveAI);
        updatePosition(); // Initial position update
    </script>
</body>
</html>
