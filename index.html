<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Rendering Engine</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');

    const screenWidth = 800;
    const screenHeight = 600;

    const vertices = [
      { x: -1, y: -1, z: -1 },
      { x:  1, y: -1, z: -1 },
      { x:  1, y:  1, z: -1 },
      { x: -1, y:  1, z: -1 },
      { x: -1, y: -1, z:  1 },
      { x:  1, y: -1, z:  1 },
      { x:  1, y:  1, z:  1 },
      { x: -1, y:  1, z:  1 },
    ];

    const faces = [
      [0, 1, 2, 3], // Front face
      [4, 5, 6, 7], // Back face
      [0, 3, 7, 4], // Left face
      [1, 2, 6, 5], // Right face
      [3, 2, 6, 7], // Top face
      [0, 1, 5, 4], // Bottom face
    ];

    const camera = {
      position: { x: 0, y: 0, z: 5 },
      rotation: { x: 0, y: 0, z: 0 },
      fov: Math.PI / 3,
      speed: 0.1,
    };

    document.addEventListener('keydown', (event) => {
      // Basic camera movement
      if (event.key === 'ArrowUp') camera.position.z -= camera.speed;
      if (event.key === 'ArrowDown') camera.position.z += camera.speed;
      if (event.key === 'ArrowLeft') camera.position.x -= camera.speed;
      if (event.key === 'ArrowRight') camera.position.x += camera.speed;
    });

    function project(vertex) {
      const scale = camera.fov / (camera.position.z - vertex.z);
      const x = (vertex.x - camera.position.x) * scale + screenWidth / 2;
      const y = (vertex.y - camera.position.y) * scale + screenHeight / 2;
      return { x, y };
    }

    function draw() {
      ctx.clearRect(0, 0, screenWidth, screenHeight);

      const rotatedVertices = vertices.map((vertex) => {
        const x = vertex.x * Math.cos(camera.rotation.y) - vertex.z * Math.sin(camera.rotation.y);
        const z = vertex.x * Math.sin(camera.rotation.y) + vertex.z * Math.cos(camera.rotation.y);
        return { x, y: vertex.y, z };
      });

      faces.forEach((face) => {
        const screenVertices = face.map((vertexIndex) => project(rotatedVertices[vertexIndex]));

        ctx.beginPath();
        ctx.moveTo(screenVertices[0].x, screenVertices[0].y);

        for (let i = 1; i < screenVertices.length; i++) {
          ctx.lineTo(screenVertices[i].x, screenVertices[i].y);
        }

        ctx.closePath();
        ctx.stroke();
      });
    }

    function update() {
      draw();
      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
</html>
