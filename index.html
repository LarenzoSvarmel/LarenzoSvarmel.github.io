<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movement with Shooting</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            angle: 0,
            speed: 2,
            baseSpeed: 2,
            isMoving: false,
            targetX: 0,
            targetY: 0,
            ammo: 20,
            maxAmmo: 20, // Maximum magazine size
            bullets: [],
            reloading: false,
            reloadTime: 4000, // in milliseconds
            shootDelay: 1000, // in milliseconds
            lastShotTime: 0,
            weaponType: 'Pistol',
            damage: 20,
            stamina: 100,
            maxStamina: 100,
            isRunning: false,
        };

        const bullet = {
            size: 5,
            speed: 5,
            color: 'yellow',
        };

        function drawPlayer() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw bullets
            player.bullets.forEach(b => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw player
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw arrow indicating player direction
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(player.size * 2, 0);
            ctx.lineTo(player.size * 1.8, player.size * 0.2);
            ctx.lineTo(player.size * 1.8, -player.size * 0.2);
            ctx.closePath();
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.restore();

            // Draw reloading text
            if (player.reloading) {
                ctx.fillStyle = 'red';
                ctx.font = '16px Arial';
                ctx.fillText('Reloading...', player.x - 30, player.y + player.size + 20);
            }

            // Draw ammo counter
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText(`Ammo: ${player.ammo}`, 10, 20);

            // Draw weapon type text
            ctx.fillText(`Weapon: ${player.weaponType}`, 10, 40);

            // Draw stamina meter
            const staminaWidth = (player.stamina / player.maxStamina) * 100;
            ctx.fillStyle = 'green';
            ctx.fillRect(10, 60, staminaWidth, 10);
        }

        function updatePlayer() {
            if (player.isMoving) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > player.speed) {
                    player.x += (dx / distance) * player.speed;
                    player.y += (dy / distance) * player.speed;
                } else {
                    player.isMoving = false;
                }

                player.angle = Math.atan2(dy, dx);
            }

            // Update bullet positions
            player.bullets.forEach(b => {
                b.x += Math.cos(b.angle) * bullet.speed;
                b.y += Math.sin(b.angle) * bullet.speed;
            });

            // Remove bullets that are out of bounds
            player.bullets = player.bullets.filter(b => b.x >= 0 && b.x <= canvas.width && b.y >= 0 && b.y <= canvas.height);

            // Handle reloading
            if (player.ammo === 0 && !player.reloading) {
                const ammoToReload = player.maxAmmo - player.ammo;
                player.reloading = true;

                setTimeout(() => {
                    player.ammo += ammoToReload;
                    player.reloading = false;
                }, player.reloadTime);
            }

            // Update stamina
            if (player.isRunning) {
                player.stamina -= 0.2;
                if (player.stamina <= 0) {
                    player.stamina = 0;
                    player.isRunning = false;
                }
            } else if (player.stamina < player.maxStamina) {
                player.stamina += 0.1;
            }
        }

        function shoot() {
            const currentTime = new Date().getTime();

            if (player.ammo > 0 && !player.reloading && currentTime - player.lastShotTime > player.shootDelay) {
                player.bullets.push({
                    x: player.x,
                    y: player.y,
                    angle: player.angle,
                });

                player.ammo--;
                player.lastShotTime = currentTime;
            }
        }

        function startRunning() {
            if (!player.isRunning && player.stamina > 0) {
                player.isRunning = true;
            }
        }

        function stopRunning() {
            player.isRunning = false;
        }

        function onMouseDown(event) {
            player.isMoving = true;
            player.targetX = event.clientX - canvas.getBoundingClientRect().left;
            player.targetY = event.clientY - canvas.getBoundingClientRect().top;
        }

        function onMouseUp() {
            player.isMoving = false;
        }

        function onMouseMove(event) {
            if (player.isMoving) {
                player.targetX = event.clientX - canvas.getBoundingClientRect().left;
                player.targetY = event.clientY - canvas.getBoundingClientRect().top;
            }
        }

        function onKeyDown(event) {
            if (event.code === 'Space') {
                shoot();
            } else if (event.code === 'ShiftLeft') {
                startRunning();
            }
        }

        function onKeyUp(event) {
            if (event.code === 'ShiftLeft') {
                stopRunning();
            }
        }

        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('mousemove', onMouseMove);
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);

        function gameLoop() {
            updatePlayer();
            drawPlayer();
            requestAnimationFrame(gameLoop);
        }

        // Adjust canvas size based on the window size
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawPlayer();
        });

        // Initial setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameLoop();
    </script>
</body>
</html>
