<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycast Engine with Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="raycastCanvas"></canvas>

    <script>
        const canvas = document.getElementById('raycastCanvas');
        const ctx = canvas.getContext('2d');

        const screenWidth = 800;
        const screenHeight = 600;

        canvas.width = screenWidth;
        canvas.height = screenHeight;

        const player = {
            x: 50,
            y: 50,
            angle: Math.PI / 4,
            fov: Math.PI / 2,
            speed: 5
        };

        const map = [
            "1111111111",
            "1000000001",
            "1010101011",
            "1000000001",
            "1111111111"
        ];

        const tileSize = 50;

        function drawMap() {
            for (let i = 0; i < map.length; i++) {
                for (let j = 0; j < map[i].length; j++) {
                    if (map[i][j] === '1') {
                        // Wall rendering
                        ctx.fillStyle = 'gray';
                        ctx.fillRect(j * tileSize, i * tileSize, tileSize, tileSize);

                        // Lines for depth perception
                        ctx.beginPath();
                        ctx.moveTo(j * tileSize + tileSize, i * tileSize);
                        ctx.lineTo(j * tileSize + tileSize, (i + 1) * tileSize);
                        ctx.strokeStyle = 'black';
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(j * tileSize, i * tileSize + tileSize);
                        ctx.lineTo((j + 1) * tileSize, i * tileSize + tileSize);
                        ctx.stroke();
                    } else {
                        // Floor rendering
                        ctx.fillStyle = 'lightgray';
                        ctx.fillRect(j * tileSize, i * tileSize, tileSize, tileSize);
                    }
                }
            }
        }

        function castRays() {
            // Raycasting logic
            const rays = [];

            for (let i = 0; i < screenWidth; i++) {
                const angle = player.angle - player.fov / 2 + (i / screenWidth) * player.fov;
                rays.push(angle);
            }

            for (let i = 0; i < rays.length; i++) {
                const angle = rays[i];

                // Ray intersection logic (example: simple ray projection)
                const rayEndX = player.x + Math.cos(angle) * 1000;
                const rayEndY = player.y + Math.sin(angle) * 1000;

                // Check for collisions with the map
                const mapX = Math.floor(rayEndX / tileSize);
                const mapY = Math.floor(rayEndY / tileSize);

                if (mapY >= 0 && mapY < map.length && mapX >= 0 && mapX < map[mapY].length && map[mapY][mapX] === '1') {
                    // Handle collision (example: darken the wall color)
                    ctx.fillStyle = 'darkgray';
                } else {
                    // No collision, render as usual
                    ctx.fillStyle = 'gray';
                }

                // Render the rays on the canvas
                ctx.fillRect(i, screenHeight / 2, 1, screenHeight / 2);
            }
        }

        function update() {
            // Player movement logic
            // ...

            // Cast rays and render
            castRays();

            // Render the map
            drawMap();

            // Additional game logic
        }

        // The rest of your existing code remains unchanged
    </script>
</body>

</html>
