<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raycasting Demo with Shadow Casting</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
  <script src="rot.js"></script>
</head>
<body>
  <canvas id="raycastingCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('raycastingCanvas');
    const ctx = canvas.getContext('2d');

    const screenWidth = 800;
    const screenHeight = 600;
    const tileSize = 32;
    const map = [
      "1111111111111111",
      "1000000000000001",
      "1001111111111001",
      "1001000000001001",
      "1001001111101001",
      "1001001000101001",
      "1001001111101001",
      "1001000000001001",
      "1001111111111001",
      "1000000000000001",
      "1111111111111111",
    ];

    const player = {
      x: 100,
      y: 100,
      angle: 0,
      fov: Math.PI / 3,
      speed: 5,
      isMouseLocked: false,
    };

    function drawMap() {
      ctx.clearRect(0, 0, screenWidth, screenHeight);

      // Draw sky
      ctx.fillStyle = 'deepskyblue';
      ctx.fillRect(0, 0, screenWidth, screenHeight / 2);

      // Draw ground
      ctx.fillStyle = 'saddlebrown';
      ctx.fillRect(0, screenHeight / 2, screenWidth, screenHeight / 2);

      // Draw walls using ROT.js shadow casting
      const level = new ROT.Map.Arena(map.length, map[0].length);
      const fov = new ROT.FOV.RecursiveShadowcasting((x, y) => {
        return level.get(x, y) === " ";
      });

      fov.compute(player.x, player.y, player.fov, (x, y, r, visibility) => {
        if (visibility > 0) {
          ctx.fillStyle = 'gray';
          ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
      });

      // Draw player
      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 5, 0, 2 * Math.PI);
      ctx.fill();
      ctx.closePath();
    }

    function handleInput() {
      // Handle player input
      if (keys['ArrowLeft']) {
        player.angle -= 0.05;
      }
      if (keys['ArrowRight']) {
        player.angle += 0.05;
      }
      if (keys['ArrowUp']) {
        const moveStep = player.speed;
        const newX = player.x + Math.cos(player.angle) * moveStep;
        const newY = player.y + Math.sin(player.angle) * moveStep;

        if (!isWall(newX, newY)) {
          player.x = newX;
          player.y = newY;
        }
      }
      if (keys['ArrowDown']) {
        const moveStep = player.speed;
        const newX = player.x - Math.cos(player.angle) * moveStep;
        const newY = player.y - Math.sin(player.angle) * moveStep;

        if (!isWall(newX, newY)) {
          player.x = newX;
          player.y = newY;
        }
      }
      if (keys['KeyL']) {
        toggleMouseLock();
      }
    }

    function toggleMouseLock() {
      if (!player.isMouseLocked) {
        canvas.requestPointerLock();
      } else {
        document.exitPointerLock();
      }
      player.isMouseLocked = !player.isMouseLocked;
    }

    const keys = {};

    document.addEventListener('keydown', (event) => {
      keys[event.code] = true;
    });

    document.addEventListener('keyup', (event) => {
      keys[event.code] = false;
    });

    document.addEventListener('mousemove', (event) => {
      if (player.isMouseLocked) {
        const deltaX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
        player.angle += deltaX * 0.01;
      }
    });

    function isWall(x, y) {
      // Check if the given coordinates are inside a wall
      const mapX = Math.floor(x / tileSize);
      const mapY = Math.floor(y / tileSize);

      return map[mapY][mapX] === "1";
    }

    function update() {
      // Update game logic here
      handleInput();
    }

    function gameLoop() {
      update();
      drawMap();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
