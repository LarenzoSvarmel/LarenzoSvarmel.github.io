<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
  <title>Raycast FPS Engine</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const screenWidth = 800;
    const screenHeight = 600;
    
    canvas.width = screenWidth;
    canvas.height = screenHeight;

    const player = {
      x: 50,
      y: 50,
      angle: Math.PI / 4,
      fov: Math.PI / 2,
      speed: 5,
      turnSpeed: Math.PI / 180,
    };

    function update() {
      // Handle input
      if (keys['w']) {
        player.x += player.speed * Math.cos(player.angle);
        player.y += player.speed * Math.sin(player.angle);
      }
      if (keys['s']) {
        player.x -= player.speed * Math.cos(player.angle);
        player.y -= player.speed * Math.sin(player.angle);
      }
      if (keys['a']) {
        player.angle -= player.turnSpeed;
      }
      if (keys['d']) {
        player.angle += player.turnSpeed;
      }

      // Render scene
      ctx.clearRect(0, 0, screenWidth, screenHeight);
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, screenWidth, screenHeight);

      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 5, 0, Math.PI * 2);
      ctx.fill();

      // Draw rays (simple representation)
      for (let i = 0; i < screenWidth; i++) {
        const rayAngle = player.angle - player.fov / 2 + (i / screenWidth) * player.fov;
        const rayX = player.x + Math.cos(rayAngle) * 100;
        const rayY = player.y + Math.sin(rayAngle) * 100;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(rayX, rayY);
        ctx.stroke();
      }
    }

    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function gameLoop() {
      update();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
