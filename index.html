<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #ai-container {
            position: relative;
            width: 80vw;
            height: 80vh;
            background-color: #fff;
            border: 2px solid #333;
            overflow: hidden;
        }

        #ai {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #3498db;
            border-radius: 50%;
            transition: transform 0.2s ease-in-out;
        }

        #arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #3498db;
            transform-origin: 50% 0;
            transition: transform 0.2s ease-in-out;
        }
    </style>
</head>
<body>

<div id="ai-container">
    <div id="ai"></div>
    <div id="arrow"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const aiContainer = document.getElementById('ai-container');
        const ai = document.getElementById('ai');
        const arrow = document.getElementById('arrow');

        let aiPosition = { x: aiContainer.clientWidth / 2, y: aiContainer.clientHeight / 2 };
        let angle = 0;

        function updateAI() {
            ai.style.transform = `translate(${aiPosition.x - 10}px, ${aiPosition.y - 10}px)`;
            arrow.style.transform = `translate(${aiPosition.x}px, ${aiPosition.y}px) rotate(${angle}deg)`;
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function handleMouseMove(event) {
            const mouseX = event.clientX - aiContainer.getBoundingClientRect().left;
            const mouseY = event.clientY - aiContainer.getBoundingClientRect().top;

            aiPosition.x = clamp(mouseX, 0, aiContainer.clientWidth);
            aiPosition.y = clamp(mouseY, 0, aiContainer.clientHeight);

            updateAI();
        }

        function handleResize() {
            aiPosition.x = clamp(aiPosition.x, 0, aiContainer.clientWidth);
            aiPosition.y = clamp(aiPosition.y, 0, aiContainer.clientHeight);

            updateAI();
        }

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('resize', handleResize);

        // Initial update
        updateAI();
    });
</script>

</body>
</html>
