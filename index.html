<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Raycasting Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: darkgreen;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 5,
            fov: Math.PI / 2,
            viewDist: 300,
            angle: Math.PI / 4,
            speed: 3,
        };

        const wall = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 10,
            height: 200,
        };

        const enemies = [];

        function drawPlayer() {
            // Draw player
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw player view
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            const endX = player.x + Math.cos(player.angle) * player.viewDist;
            const endY = player.y + Math.sin(player.angle) * player.viewDist;
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        function drawWall() {
            // Draw wall
            ctx.fillStyle = 'gray';
            ctx.fillRect(wall.x - wall.width / 2, wall.y - wall.height / 2, wall.width, wall.height);
        }

        function drawEnemies() {
            // Draw enemies
            ctx.fillStyle = 'red';
            enemies.forEach(enemy => {
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, player.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function castRays() {
            for (let i = 0; i < canvas.width; i++) {
                const rayAngle = player.angle - player.fov / 2 + (i / canvas.width) * player.fov;
                const rayEndX = player.x + Math.cos(rayAngle) * player.viewDist;
                const rayEndY = player.y + Math.sin(rayAngle) * player.viewDist;

                const intersection = raycast(player.x, player.y, rayEndX, rayEndY);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(intersection.x, intersection.y);
                ctx.stroke();
            }
        }

        function raycast(startX, startY, endX, endY) {
            const dx = endX - startX;
            const dy = endY - startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const stepX = dx / dist;
            const stepY = dy / dist;

            let x = startX;
            let y = startY;

            while (getDistance(x, y, wall.x, wall.y) > player.size) {
                x += stepX;
                y += stepY;
            }

            return { x, y };
        }

        function getDistance(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function updatePlayer() {
            if (keys['ArrowLeft']) {
                player.angle -= 0.1;
            }
            if (keys['ArrowRight']) {
                player.angle += 0.1;
            }
            if (keys['ArrowUp']) {
                const newX = player.x + Math.cos(player.angle) * player.speed;
                const newY = player.y + Math.sin(player.angle) * player.speed;
                if (!checkWallCollision(newX, newY)) {
                    player.x = newX;
                    player.y = newY;
                }
            }
            if (keys['ArrowDown']) {
                const newX = player.x - Math.cos(player.angle) * player.speed;
                const newY = player.y - Math.sin(player.angle) * player.speed;
                if (!checkWallCollision(newX, newY)) {
                    player.x = newX;
                    player.y = newY;
                }
            }
        }

        function checkWallCollision(x, y) {
            return (
                x - player.size < wall.x + wall.width / 2 &&
                x + player.size > wall.x - wall.width / 2 &&
                y - player.size < wall.y + wall.height / 2 &&
                y + player.size > wall.y - wall.height / 2
            );
        }

        function gameLoop() {
            updatePlayer();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            castRays();
            drawWall();
            drawEnemies();
            drawPlayer();

            requestAnimationFrame(gameLoop);
        }

        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Initialize enemies
        for (let i = 0; i < 5; i++) {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
            });
        }

        // Initial setup
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        gameLoop();
    </script>
</body>
</html>
