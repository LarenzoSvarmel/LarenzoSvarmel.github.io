<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="fpsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fpsCanvas');
        const ctx = canvas.getContext('2d');

        // Player position
        let playerX = canvas.width / 2;
        let playerY = canvas.height / 2;

        // Move speed
        const speed = 5;

        function drawPlayer() {
            ctx.beginPath();
            ctx.moveTo(playerX, playerY - 20);
            ctx.lineTo(playerX - 10, playerY + 20);
            ctx.lineTo(playerX + 10, playerY + 20);
            ctx.closePath();
            ctx.fillStyle = '#00F'; // Blue color
            ctx.fill();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function update() {
            clearCanvas();
            drawPlayer();
        }

        function movePlayer(keyCode) {
            switch (keyCode) {
                case 87: // W key
                    playerY -= speed;
                    break;
                case 83: // S key
                    playerY += speed;
                    break;
                case 65: // A key
                    playerX -= speed;
                    break;
                case 68: // D key
                    playerX += speed;
                    break;
            }
        }

        window.addEventListener('keydown', (event) => {
            movePlayer(event.keyCode);
        });

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
