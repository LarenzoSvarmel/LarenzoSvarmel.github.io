<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raycasting Demo</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="raycastingCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('raycastingCanvas');
    const ctx = canvas.getContext('2d');
    let gl;

    document.addEventListener('DOMContentLoaded', initWebGL);

    function initWebGL() {
      gl = canvas.getContext('webgl');

      if (!gl) {
        console.error('Unable to initialize WebGL. Your browser may not support it.');
        return;
      }

      const vertexShaderSource = `
        attribute vec2 a_position;
        varying vec2 v_texCoord;
        
        void main() {
          gl_Position = vec4(a_position, 0, 1);
          v_texCoord = (a_position + 1.0) / 2.0;
        }
      `;

      const fragmentShaderSource = `
        precision mediump float;
        varying vec2 v_texCoord;
        
        uniform sampler2D u_image;
        uniform float u_flashlightRadius;
        uniform vec2 u_flashlightPosition;

        void main() {
          vec4 color = texture2D(u_image, v_texCoord);

          // Calculate distance to flashlight position
          float distance = distance(v_texCoord, u_flashlightPosition);

          // Apply circular gradient for the flashlight effect
          float gradient = smoothstep(u_flashlightRadius, u_flashlightRadius + 0.01, u_flashlightRadius - distance);

          // Mix the original color with black based on the gradient
          gl_FragColor = mix(color, vec4(0.0, 0.0, 0.0, 1.0), gradient);
        }
      `;

      const shaderProgram = createShaderProgram(gl, vertexShaderSource, fragmentShaderSource);

      // ... (rest of the code remains unchanged)
    }

    function createShaderProgram(gl, vertexShaderSource, fragmentShaderSource) {
      const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
      const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

      if (!vertexShader || !fragmentShader) {
        return null;
      }

      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);

      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Unable to initialize the shader program: ' + gl.getProgramInfoLog(program));
        return null;
      }

      return program;
    }

    function compileShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);

      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('An error occurred compiling the shaders: ' + gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }

      return shader;
    }

    // ... (rest of the code remains unchanged)
  </script>
</body>
</html>
