<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movement with Shooting</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: darkgreen;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            angle: 0,
            speed: 2,
            baseSpeed: 2,
            runningSpeed: 5,
            isMoving: false,
            targetX: 0,
            targetY: 0,
            ammo: 20,
            maxAmmo: 20,
            bullets: [],
            reloading: false,
            reloadTime: 4000,
            shootDelay: 1000,
            lastShotTime: 0,
            weaponType: 'Pistol',
            damage: 20,
            stamina: 100,
            maxStamina: 100,
            isRunning: false,
            health: 100,
            damageCooldown: 3000,
            lastDamageTime: 0,
        };

        const bullet = {
            size: 5,
            speed: 5,
            color: 'yellow',
        };

        function drawPlayer() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'darkgreen';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            player.bullets.forEach(b => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(player.size * 2, 0);
            ctx.lineTo(player.size * 1.8, player.size * 0.2);
            ctx.lineTo(player.size * 1.8, -player.size * 0.2);
            ctx.closePath();
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.restore();

            if (player.reloading) {
                ctx.fillStyle = 'red';
                ctx.font = '16px Arial';
                ctx.fillText('Reloading...', player.x - 30, player.y + player.size + 20);
            }

            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText(`Ammo: ${player.ammo}`, 10, 20);
            ctx.fillText(`Weapon: ${player.weaponType}`, 10, 40);

            const staminaWidth = (player.stamina / player.maxStamina) * 100;
            ctx.fillStyle = 'green';
            ctx.fillRect(10, 60, staminaWidth, 10);

            ctx.fillStyle = 'red';
            ctx.fillRect(player.x - player.size, player.y - player.size - 20, (player.health / 100) * (player.size * 2), 5);
        }

        function updatePlayer() {
            if (player.isMoving) {
                const dx = player.targetX - player.x,
                    dy = player.targetY - player.y,
                    distance = Math.sqrt(dx * dx + dy * dy);
                player.speed = player.isRunning && player.stamina > 0 ? player.runningSpeed : player.baseSpeed;

                if (distance > player.speed) {
                    player.x += (dx / distance) * player.speed;
                    player.y += (dy / distance) * player.speed;
                } else player.isMoving = false;

                player.angle = Math.atan2(dy, dx);
            }

            player.bullets.forEach(b => { b.x += Math.cos(b.angle) * bullet.speed; b.y += Math.sin(b.angle) * bullet.speed; });
            player.bullets = player.bullets.filter(b => b.x >= 0 && b.x <= canvas.width && b.y >= 0 && b.y <= canvas.height);

            if (player.ammo === 0 && !player.reloading) {
                const ammoToReload = player.maxAmmo - player.ammo;
                player.reloading = true;
                setTimeout(() => { player.ammo += ammoToReload; player.reloading = false; }, player.reloadTime);
            }

            if (player.isRunning) player.stamina > 0 ? (player.stamina -= 0.2) : (player.stamina = 0, player.isRunning = false);
            else player.stamina < player.maxStamina ? player.stamina += 0.1 : '';

            updatePlayerHealth();
        }

        function updatePlayerHealth() {
            const currentTime = new Date().getTime();
            if (currentTime - player.lastDamageTime > player.damageCooldown) {
                player.bullets.forEach(bullet => {
                    if (bullet.x >= player.x - player.size && bullet.x <= player.x + player.size &&
                        bullet.y >= player.y - player.size && bullet.y <= player.y + player.size) {
                        player.health -= 20;
                        player.lastDamageTime = currentTime;

                        if (player.health <= 0) resetGame();
                    }
                });
            }
        }

        function shoot() {
            const currentTime = new Date().getTime();
            if (player.ammo > 0 && !player.reloading && currentTime - player.lastShotTime > player.shootDelay) {
                player.bullets.push({ x: player.x, y: player.y, angle: player.angle });
                player.ammo--;
                player.lastShotTime = currentTime;
            }
        }

        function startRunning() { if (!player.isRunning && player.stamina > 0) player.isRunning = true; }

        function stopRunning() { player.isRunning = false; }

        function togglePause() { isPaused = !isPaused; }

        function resetGame() { player.x = canvas.width / 2; player.y = canvas.height / 2; player.health = 100; player.ammo = player.maxAmmo; player.bullets = []; }

        function onKeyDown(event) {
            if (event.code === 'Space') shoot();
            else if (event.code === 'ShiftLeft') startRunning();
            else if (event.code === 'KeyP') togglePause();
            else if (event.code === 'Digit0') resetGame();
        }

        function onKeyUp(event) { if (event.code === 'ShiftLeft') stopRunning(); }

        canvas.addEventListener('mousedown', e => { player.isMoving = true; player.targetX = e.clientX - canvas.getBoundingClientRect().left; player.targetY = e.clientY - canvas.getBoundingClientRect().top; });
        canvas.addEventListener('mouseup', () => player.isMoving = false);
        canvas.addEventListener('mousemove', e => { if (player.isMoving) { player.targetX = e.clientX - canvas.getBoundingClientRect().left; player.targetY = e.clientY - canvas.getBoundingClientRect().top; } });
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);

        function gameLoop() {
            updatePlayer();
            drawPlayer();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawPlayer(); });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gameLoop();
    </script>
</body>
</html>
