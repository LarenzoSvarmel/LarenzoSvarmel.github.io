<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashlight Simulation</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000; /* Set the background color to black */
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #flashlight-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #flashlight {
      position: absolute;
      width: 200px; /* Adjust the size of the flashlight */
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.8) 80%); /* Gradient for the flashlight effect */
    }

    #content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2; /* Ensure content is above the flashlight layer */
    }
  </style>
</head>
<body>
  <div id="flashlight-container">
    <div id="flashlight"></div>
    <div id="content">
      <h1>Your Content Goes Here</h1>
      <p>This is the text inside the flashlight radius.</p>
    </div>
  </div>
</body>
</html>
