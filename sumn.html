<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      cursor: none;
    }

    #flashlight {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 80%, rgba(0, 0, 0, 0.8) 90%);
      pointer-events: none;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const flashlight = document.getElementById("flashlight");
      let flashlightOn = true;

      document.addEventListener("mousemove", function(event) {
        if (flashlightOn) {
          const x = event.clientX;
          const y = event.clientY;
          flashlight.style.left = x - flashlight.offsetWidth / 2 + "px";
          flashlight.style.top = y - flashlight.offsetHeight / 2 + "px";
        }
      });

      document.addEventListener("keydown", function(event) {
        if (event.key === "f" || event.key === "F") {
          flashlightOn = !flashlightOn;
          flashlight.style.display = flashlightOn ? "block" : "none";
        }
      });
    });
  </script>
</head>
<body>
  <div id="flashlight"></div>
</body>
</html>
