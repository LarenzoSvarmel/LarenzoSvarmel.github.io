<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Prompt Simulation</title>
  <style>
    body {
      background-color: black;
      color: #00ff00; /* Green text */
      font-family: 'Courier New', monospace;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #prompt {
      color: #00ff00;
      font-weight: bold;
    }

    #output {
      margin-top: 10px;
    }

    /* CRT Effect */
    @keyframes crt {
      0% {
        text-shadow: 0 0 10px #00ff00;
      }
      50% {
        text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
      }
      100% {
        text-shadow: 0 0 10px #00ff00;
      }
    }

    #prompt, #output {
      animation: crt 0.1s infinite alternate;
    }
  </style>
</head>
<body>
  <div id="prompt">
    Harmony Haven Technologies (TM)<br>
    Administrator@HarmonyHaven:
  </div>
  <div id="output">
    <p>Welcome to Harmony Haven Command Prompt Simulation</p>
    <p>Type 'help' to see available commands.</p>
  </div>
</body>
</html>
