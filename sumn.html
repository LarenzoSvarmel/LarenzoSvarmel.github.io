<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Haven Technologies (TM) - (1955-2009)</title>
    <!-- Add Google Fonts link for Consolas -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Consolas&display=swap">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: purple;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }

        #prompt {
            width: 800px;
            height: 600px;
            margin: auto;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        #header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid purple;
        }

        #input-container {
            display: flex;
            align-items: center;
        }

        #input {
            flex-grow: 1;
            border: none;
            background-color: transparent;
            color: purple;
            outline: none;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            caret-color: purple;
            width: 100%;
        }

        /* Custom cursor */
        #input:focus {
            border-bottom: 2px solid purple;
        }

        /* Scan lines for realism and immersion */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: repeating-linear-gradient(180deg, transparent, transparent 2px, #444 2px, #444 4px);
        }
    </style>
</head>
<body>
    <div id="prompt">
        <div id="header">Harmony Haven Technologies (TM) - (1955-2009)</div>
        <div id="output">Welcome to Harmony Haven Technologies. Type commands here...</div>
        <div id="input-container">
            <span>&gt;</span>
            <input type="text" id="input" autofocus>
        </div>
    </div>
</body>
</html>
