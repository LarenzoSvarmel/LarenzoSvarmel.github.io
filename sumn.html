<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: black;
            color: purple;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }

        #prompt {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-top: 2px solid purple;
        }

        #output {
            padding: 10px;
            height: calc(100% - 40px);
            overflow-y: auto;
            box-sizing: border-box;
        }

        .crt {
            animation: crt 0.1s infinite alternate-reverse;
        }

        @keyframes crt {
            0% {
                opacity: 0.8;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="output" class="crt">
        <div>Harmony Haven Technologies (TM)</div>
        <div id="user">Administrator@HarmonyHaven:</div>
        <div>Welcome to Harmony Haven Command Prompt. Type 'help' for a list of commands.</div>
    </div>
    <div id="prompt">
        <span id="user">Administrator@HarmonyHaven:</span> <input type="text" id="input" autofocus>
    </div>

    <script>
        document.getElementById('input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                handleCommand();
            }
        });

        function handleCommand() {
            const inputElement = document.getElementById('input');
            const outputElement = document.getElementById('output');
            const userElement = document.getElementById('user');

            const command = inputElement.value.trim();
            const response = executeCommand(command);

            const newLine = document.createElement('div');
            newLine.textContent = userElement.textContent + ' ' + command;
            outputElement.appendChild(newLine);

            if (response) {
                const responseLine = document.createElement('div');
                responseLine.textContent = response;
                outputElement.appendChild(responseLine);
            }

            inputElement.value = '';
            outputElement.scrollTop = outputElement.scrollHeight;
        }

        function executeCommand(command) {
            switch (command.toLowerCase()) {
                case 'help':
                    return 'Available commands: <br>- help<br>- about<br>- contact';
                case 'about':
                    return 'Harmony Haven Technologies (TM) is a leading technology company.';
                case 'contact':
                    return 'For support, please email support@harmonyhaven.com';
                default:
                    return 'Command not recognized. Type "help" for a list of commands.';
            }
        }
    </script>
</body>
</html>
