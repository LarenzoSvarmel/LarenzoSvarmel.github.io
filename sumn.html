<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly to C++ Decompiler</title>
    <style>
        #input {
            width: 100%;
            height: 200px;
        }
        #output {
            white-space: pre;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Assembly to C++ Decompiler</h1>
    <input type="file" id="fileInput" accept=".asm, .s">
    <textarea id="input" placeholder="Enter assembly code..."></textarea>
    <button onclick="loadFile()">Load File</button>
    <button onclick="decompile()">Decompile</button>
    <pre id="output"></pre>

    <script>
        function loadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('input').value = e.target.result;
                };
                reader.readAsText(file);
            }
        }

        function decompile() {
            const inputCode = document.getElementById('input').value;
            const decompiledCode = simulateDecompiler(inputCode);
            document.getElementById('output').innerText = decompiledCode;
        }

        function simulateDecompiler(assemblyCode) {
            const lines = assemblyCode.split('\n');
            let decompiledCode = '';

            for (const line of lines) {
                const parts = line.trim().split(/\s+/);

                if (parts.length === 0) {
                    // Empty line
                    decompiledCode += '\n';
                } else if (parts[0] === 'MOV') {
                    // Simulate MOV instruction decompilation
                    const dest = parts[1];
                    const src = parts[2];
                    decompiledCode += `${dest} = ${src};\n`;
                } else if (parts[0] === 'ADD') {
                    // Simulate ADD instruction decompilation
                    const dest = parts[1];
                    const src = parts[2];
                    decompiledCode += `${dest} += ${src};\n`;
                } else if (parts[0] === 'SUB') {
                    // Simulate SUB instruction decompilation
                    const dest = parts[1];
                    const src = parts[2];
                    decompiledCode += `${dest} -= ${src};\n`;
                } else {
                    // Unhandled instruction
                    decompiledCode += `// Unhandled assembly instruction: ${line}\n`;
                }
            }

            return decompiledCode;
        }
    </script>
</body>
</html>
