<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Terminal</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            cursor: none; /* Hide the default cursor */
        }

        #terminal {
            font-family: 'Courier New', monospace;
            font-size: 16px; /* Set the desired font size */
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        #output,
        #input-container,
        #prompt,
        #cursor,
        #input {
            font-family: 'Courier New', monospace;
            font-size: 16px; /* Set the desired font size */
        }

        #output {
            white-space: pre-wrap;
        }

        #input-container {
            display: flex;
        }

        #prompt {
            color: #00ff00; /* Green color for the prompt */
        }

        #cursor {
            width: 8px; /* Adjust the cursor width as needed */
            height: 20px; /* Adjust the cursor height as needed */
            background-color: #00ff00; /* Green color for the cursor */
            animation: blink 1s infinite; /* Blink animation */
            display: inline-block;
            margin-right: 5px; /* Adjust the spacing between cursor and text */
        }

        #input {
            flex-grow: 1;
            border: none;
            background-color: black;
            color: white;
            outline: none;
        }

        #input:focus {
            outline: none;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-container">
            <div id="prompt">Leith@HarmonyHaven:80996</div>
            <div id="cursor"></div>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script>
        const outputContainer = document.getElementById('output');
        const inputElement = document.getElementById('input');

        inputElement.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const inputText = inputElement.value;
                executeCommand(inputText);
                inputElement.value = '';
            }
        });

        function executeCommand(command) {
            const outputText = simulateCommandExecution(command);
            appendOutput(`$ ${command}\n${outputText}\n`);
        }

        function simulateCommandExecution(command) {
            // Here, you can implement your own logic to handle commands.
            // For now, let's just echo back the command.
            return `Command not implemented: ${command}`;
        }

        function appendOutput(text) {
            outputContainer.innerHTML += text;
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }
    </script>
</body>
</html>
