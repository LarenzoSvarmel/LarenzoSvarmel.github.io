<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Bot API Example</title>
</head>
<body>

<script>
  // Replace 'YOUR_BOT_TOKEN' with your actual bot token
  const botToken = '1173995246703616020';

  // Replace 'YOUR_GUILD_ID' with the ID of your Discord server (guild)
  const guildId = '1213584600488476793';

  // Function to make a simple API request to get bot information
  async function getBotInfo() {
    try {
      const response = await fetch(`https://discord.com/api/v10/guilds/${guildId}/members`, {
        method: 'GET',
        headers: {
          'Authorization': `Bot ${botToken}`,
        },
      });

      if (!response.ok) {
        throw new Error(`HTTP error! Status: ${response.status}`);
      }

      const data = await response.json();
      console.log('Bot Information:', data);
    } catch (error) {
      console.error('Error:', error);
    }
  }

  // Call the function when the page loads
  window.onload = getBotInfo;
</script>

</body>
</html>
