<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt Simulation</title>
    <style>
        body {
            background-color: black;
            color: purple;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #prompt {
            border: 1px solid purple;
            padding: 10px;
            width: 80%;
            max-width: 600px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #prompt::before {
            content: "Harmony Haven Technologies (TM)\nAdministrator@HarmonyHaven:";
            white-space: pre;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            color: white;
        }

        #command-line {
            margin-top: 20px;
            color: white;
            display: flex;
            align-items: center;
        }

        #input {
            background-color: transparent;
            border: none;
            outline: none;
            color: purple;
            font-family: 'Courier New', monospace;
            flex-grow: 1;
            caret-color: purple;
            border-bottom: 1px solid purple;
        }

        #input::placeholder {
            color: purple;
            opacity: 0.5;
        }

        #scan-lines {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(180deg, transparent, transparent 1px, rgba(255, 255, 255, 0.1) 1px, rgba(255, 255, 255, 0.1) 2px);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="prompt">
        <div id="scan-lines"></div>
        <div id="command-line">$ <span id="command-text"></span></div>
        <input type="text" id="input" placeholder="Type here...">
    </div>

    <script>
        const input = document.getElementById('input');
        const commandText = document.getElementById('command-text');

        input.addEventListener('input', function () {
            commandText.innerText = this.value;
        });
    </script>
</body>
</html>
