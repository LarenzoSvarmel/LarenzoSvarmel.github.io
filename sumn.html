<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Tifax-AJ7g', sans-serif; /* Replace 'YourCustomFont' with the actual font name or URL */
      margin: 0;
      overflow: hidden;
      cursor: none;
    }

    #terminal {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
    }

    #prompt {
      display: block;
      margin-bottom: 5px;
    }

    #input-line {
      display: flex;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
    }

    #cursor {
      display: inline-block;
      width: 8px; /* Adjust the cursor size as needed */
      height: 20px;
      background-color: white;
      animation: cursor-blink 0.8s infinite;
    }

    @keyframes cursor-blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="output">
      <!-- Your terminal output goes here -->
    </div>
    <div id="input-line">
      <span id="prompt">Administrator@HarmonyHaven:1$</span>
      <span id="input" contenteditable></span>
      <span id="cursor"></span>
    </div>
  </div>

  <!-- Include your custom font -->
  <!-- Example using Google Fonts -->
  <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=YourCustomFont&display=swap"> -->

  <script>
    // JavaScript for handling typing effect
    const inputElement = document.getElementById('input');
    const cursorElement = document.getElementById('cursor');

    inputElement.addEventListener('input', function() {
      cursorElement.style.display = 'none';
    });

    inputElement.addEventListener('focus', function() {
      cursorElement.style.display = 'inline-block';
    });

    inputElement.addEventListener('blur', function() {
      cursorElement.style.display = 'none';
    });
  </script>
</body>
</html>
