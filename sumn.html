<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashlight Effect</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #flashlight {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.7) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="flashlight"></div>

<script>
  document.addEventListener('mousemove', (e) => {
    const flashlight = document.getElementById('flashlight');
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const flashlightSize = 100; // Adjust the size of the flashlight

    flashlight.style.left = `${mouseX - flashlightSize / 2}px`;
    flashlight.style.top = `${mouseY - flashlightSize / 2}px`;
  });
</script>

</body>
</html>
