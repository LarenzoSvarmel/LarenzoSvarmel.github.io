<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 2000 Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #008080;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 20px;
            border: 2px solid #000000;
            border-radius: 5px;
            width: 300px;
            text-align: center;
        }

        .login-form input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        .login-form button {
            background-color: #008080;
            color: #ffffff;
            padding: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .login-form button:hover {
            background-color: #006666;
        }

        .post-login-content {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h2>Windows 2000 Login</h2>
            <form id="loginForm" onsubmit="return login()">
                <input type="text" id="username" placeholder="Username" required>
                <br>
                <input type="password" id="password" placeholder="Password" required>
                <br>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="post-login-content" id="postLoginContent">
            <h3>Welcome, admin!</h3>
            <p>This is the post-login content.</p>
        </div>
    </div>

    <script>
        function login() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            // Check the username and password
            if (username === 'admin' && password === 'admin') {
                // Hide the login form
                document.getElementById('loginForm').style.display = 'none';
                // Show the post-login content
                document.getElementById('postLoginContent').style.display = 'block';
                return false; // Prevent form submission
            } else {
                alert('Invalid username or password. Please try again.');
                return false; // Prevent form submission
            }
        }
    </script>
</body>
</html>
