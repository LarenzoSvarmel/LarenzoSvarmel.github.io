<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Terminal</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        #output {
            white-space: pre-wrap;
        }

        #input-container {
            display: flex;
        }

        #input {
            flex-grow: 1;
            border: none;
            background-color: black;
            color: white;
            outline: none;
        }

        #input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-container">
            <span>$</span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script>
        const outputContainer = document.getElementById('output');
        const inputElement = document.getElementById('input');

        inputElement.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const inputText = inputElement.value;
                executeCommand(inputText);
                inputElement.value = '';
            }
        });

        function executeCommand(command) {
            const outputText = simulateCommandExecution(command);
            appendOutput(`$ ${command}\n${outputText}\n`);
        }

        function simulateCommandExecution(command) {
            // Here, you can implement your own logic to handle commands.
            // For now, let's just echo back the command.
            return `Command not implemented: ${command}`;
        }

        function appendOutput(text) {
            outputContainer.innerText += text;
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }
    </script>
</body>
</html>
