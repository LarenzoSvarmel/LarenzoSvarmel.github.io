<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Consolas&display=swap">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Command Prompt</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: purple;
            font-family: Consolas, monospace;
            overflow: hidden;
        }

        #console {
            width: 600px;
            height: 450px;
            margin: 75px auto;
            padding: 10px;
            border: 1px solid purple;
            min-height: 200px;
            overflow-y: auto;
            position: relative;
        }

        input {
            width: calc(100% - 20px);
            padding: 5px;
            margin: 0;
            border: none;
            outline: none;
            background-color: black;
            color: purple;
            font-family: Consolas, monospace;
            position: absolute;
            bottom: 10px;
        }

        .cursor {
            position: absolute;
            bottom: 8px;
            height: 20px;
            width: 7px;
            background-color: purple;
            animation: blink 1s infinite step-start;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* CRT effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: repeating-linear-gradient(
                180deg,
                transparent,
                transparent 2px,
                rgba(255, 255, 255, 0.05) 2px,
                rgba(255, 255, 255, 0.05) 4px
            );
        }

        /* Start text */
        #startText {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="console">
        <div id="startText">Harmony Haven Technologies<br>1955-200X</div>
        <div class="cursor"></div>
    </div>
    <input type="text" id="commandInput" autocomplete="off" autofocus>

    <script>
        const consoleDiv = document.getElementById('console');
        const inputElement = document.getElementById('commandInput');
        const cursorElement = document.querySelector('.cursor');

        const commands = {
            '?help': 'List of preset commands:\n1. ?help - Display this help message\n2. ?about - Show information about the console\n3. ?list - List items\n4. ?add [item] - Add an item to the list',
            '?about': 'Interactive Command Prompt\nVersion 1.0\nDeveloped by YourName',
            '?list': 'List items:\n1. Item 1\n2. Item 2\n3. Item 3',
            '?add': (args) => {
                const newItem = args.trim();
                if (newItem !== '') {
                    return `Added "${newItem}" to the list`;
                } else {
                    return 'Please provide an item to add to the list';
                }
            }
        };

        function executeCommand(input) {
            const [command, ...args] = input.split(' ');
            const commandFunction = commands[command];
            
            if (commandFunction) {
                let output;
                if (typeof commandFunction === 'function') {
                    output = commandFunction(args.join(' '));
                } else {
                    output = commandFunction;
                }

                consoleDiv.innerHTML += `<p>> ${input}</p>`;
                consoleDiv.innerHTML += `<p>${output}</p>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            } else {
                consoleDiv.innerHTML += `<p>> ${input}</p>`;
                consoleDiv.innerHTML += `<p>Command not found. Type ?help for a list of commands.</p>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        }

        inputElement.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                const input = inputElement.value.trim();
                if (input !== '') {
                    inputElement.value = '';
                    executeCommand(input);
                }
            }
        });
    </script>
</body>
</html>
