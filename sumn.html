<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Command Prompt</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: purple;
            font-family: Consolas, monospace;
        }

        #console {
            width: 80%;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid purple;
            min-height: 200px;
            overflow-y: auto;
        }

        input {
            width: calc(100% - 20px);
            padding: 5px;
            margin: 0;
            border: none;
            outline: none;
            background-color: black;
            color: purple;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <div id="console"></div>
    <input type="text" id="commandInput" autocomplete="off" autofocus>

    <script>
        const consoleDiv = document.getElementById('console');
        const inputElement = document.getElementById('commandInput');

        const commands = {
            '?help': 'List of preset commands:\n1. ?help - Display this help message\n2. ?about - Show information about the console\n3. ?list - List items\n4. ?add [item] - Add an item to the list',
            '?about': 'Interactive Command Prompt\nVersion 1.0\nDeveloped by YourName',
            '?list': 'List items:\n1. Item 1\n2. Item 2\n3. Item 3',
            '?add': (args) => {
                const newItem = args.trim();
                if (newItem !== '') {
                    return `Added "${newItem}" to the list`;
                } else {
                    return 'Please provide an item to add to the list';
                }
            }
        };

        function executeCommand(input) {
            const [command, ...args] = input.split(' ');
            const commandFunction = commands[command];
            
            if (commandFunction) {
                let output;
                if (typeof commandFunction === 'function') {
                    output = commandFunction(args.join(' '));
                } else {
                    output = commandFunction;
                }

                consoleDiv.innerHTML += `<p>> ${input}</p>`;
                consoleDiv.innerHTML += `<p>${output}</p>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            } else {
                consoleDiv.innerHTML += `<p>> ${input}</p>`;
                consoleDiv.innerHTML += `<p>Command not found. Type ?help for a list of commands.</p>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        }

        inputElement.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                const input = inputElement.value.trim();
                if (input !== '') {
                    inputElement.value = '';
                    executeCommand(input);
                }
            }
        });

        // Initial help message
        executeCommand('?help');
    </script>
</body>
</html>
