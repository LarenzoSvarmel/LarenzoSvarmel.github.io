<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 2000 Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #008080;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 20px;
            border: 2px solid #000000;
            border-radius: 5px;
            width: 300px;
            text-align: center;
            position: relative;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .login-form input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        .login-form button {
            background-color: #008080;
            color: #ffffff;
            padding: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .login-form button:hover {
            background-color: #006666;
        }

        #logo {
            width: 100%;
            max-width: 200px;
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .loading-circle {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #008080;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 3s linear infinite;
            margin: 20px auto; /* Center the loading circle */
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .post-login-content {
            display: none;
            margin-top: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img id="logo" src="yadaddy.jpg" alt="Logo">
        <div class="login-form">
            <form id="loginForm" onsubmit="return login()">
                <input type="text" id="username" placeholder="Username" required>
                <br>
                <input type="password" id="password" placeholder="Password" required>
                <br>
                <button type="submit">Login</button>
                <div class="loading-circle" id="loadingCircle"></div>
            </form>
        </div>
        <div class="post-login-content" id="postLoginContent">
            <h3>Welcome!</h3>
            <p>Your mom.</p>
        </div>
    </div>

    <script>
        function login() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            // Show loading circle
            document.getElementById('loadingCircle').style.display = 'block';

            // Simulate loading process (3 seconds)
            setTimeout(function () {
                // Check the username and password
                if (username === 'CrilpBungus' && password === 'admin') {
                    // Hide Form 1 (login form) and the image with fade-out animation
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('logo').style.display = 'none';
                    
                    // Hide the loading circle
                    document.getElementById('loadingCircle').style.display = 'none';
                    
                    // Show Form 2 (post-login content) with fade-in animation
                    document.getElementById('postLoginContent').style.display = 'block';
                } else {
                    // Hide the loading circle
                    document.getElementById('loadingCircle').style.display = 'none';
                    alert('Invalid username or password. Please try again.');
                }
            }, 3000);

            return false; // Prevent form submission
        }
    </script>
</body>
</html>
