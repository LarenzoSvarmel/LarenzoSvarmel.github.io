<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Android Replica</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    #status-bar {
      background-color: #4CAF50;
      color: #fff;
      padding: 10px;
      text-align: center;
    }

    #navigation-bar {
      background-color: #333;
      color: #fff;
      padding: 10px;
      text-align: center;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    #home-screen {
      margin-top: 40px;
      text-align: center;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      background-color: #fff;
      border-radius: 50%;
      margin: 10px;
      display: inline-block;
      cursor: pointer;
    }

    .app-name {
      font-size: 14px;
      margin-top: 5px;
    }

    .app-container {
      display: inline-block;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="status-bar">
    Android Replica
  </div>

  <div id="home-screen">
    <div class="app-container" onclick="openApp('App 1')">
      <div class="app-icon"></div>
      <div class="app-name">App 1</div>
    </div>
    <div class="app-container" onclick="openApp('App 2')">
      <div class="app-icon"></div>
      <div class="app-name">App 2</div>
    </div>
    <div class="app-container" onclick="openApp('App 3')">
      <div class="app-icon"></div>
      <div class="app-name">App 3</div>
    </div>
    <!-- Add more app containers as needed -->
  </div>

  <div id="navigation-bar">
    Navigation Bar
  </div>

  <script>
    function openApp(appName) {
      alert('Opening ' + appName);
      // Add more functionality here based on the app
    }
  </script>

</body>
</html>
