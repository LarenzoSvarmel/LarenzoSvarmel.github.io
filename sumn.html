<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Haven Technologies (TM) - (1955-2009)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Consolas&display=swap">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: purple;
            font-family: 'Consolas', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        #command-prompt {
            background-color: #000;
            padding: 20px;
            border: 2px solid purple;
            width: 800px;
            height: 600px;
            position: relative;
        }

        #header {
            color: purple;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #output {
            color: purple;
            font-size: 16px;
            white-space: pre-wrap;
        }

        #input-container {
            display: flex;
            align-items: center;
        }

        #input {
            color: purple;
            background-color: transparent;
            border: none;
            outline: none;
            font-family: 'Consolas', monospace;
            flex-grow: 1;
            font-size: 16px;
        }

        #cursor {
            background-color: purple;
            width: 10px;
            height: 16px;
            animation: blink 1s infinite;
            display: inline-block;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="command-prompt">
        <div id="header">Harmony Haven Technologies (TM) - (1955-2009)</div>
        <div id="output"></div>
        <div id="input-container">
            <div id="cursor"></div>
            <input id="input" type="text" autofocus>
        </div>
    </div>

    <script>
        const inputElement = document.getElementById('input');
        const outputElement = document.getElementById('output');
        const cursorElement = document.getElementById('cursor');

        inputElement.addEventListener('input', () => {
            outputElement.textContent = inputElement.value;
        });

        inputElement.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                outputElement.innerHTML += '<br>';
                inputElement.value = '';
            }
        });

        setInterval(() => {
            cursorElement.style.opacity = cursorElement.style.opacity === '0' ? '1' : '0';
        }, 500);
    </script>
</body>
</html>
