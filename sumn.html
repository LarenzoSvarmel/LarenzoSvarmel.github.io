<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashlight Effect</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black; /* Set the background to black */
    }

    #flashlight {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      pointer-events: none;
      overflow: hidden;
      mix-blend-mode: screen; /* Use mix-blend-mode to make content inside circle visible */
    }

    #flashlight-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: url('your-image.jpg'); /* Replace with your content/image */
      background-size: cover;
      transform-origin: top left;
    }
  </style>
</head>
<body>

<div id="flashlight">
  <div id="flashlight-content"></div>
</div>

<script>
  document.addEventListener('mousemove', (e) => {
    const flashlight = document.getElementById('flashlight');
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const flashlightSize = 100; // Adjust the size of the flashlight

    flashlight.style.left = `${mouseX - flashlightSize / 2}px`;
    flashlight.style.top = `${mouseY - flashlightSize / 2}px`;
  });
</script>

</body>
</html>
