<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Terminal</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'CustomFont', monospace;
            margin: 0;
            overflow: hidden;
        }

        @font-face {
            font-family: 'CustomFont';
            src: url('Tifax-AJ7g.ttf') format('ttf');
            font-weight: normal;
            font-style: normal;
        }

        #terminal {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-top: 1px solid white;
        }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: white;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="prompt">Administrator@HarmonyHaven:1 $ </div>
        <span id="command"></span><span id="cursor"></span>
    </div>

    <script>
        document.addEventListener('keydown', function (event) {
            const commandSpan = document.getElementById('command');
            const cursor = document.getElementById('cursor');

            if (event.key.length === 1) {
                commandSpan.textContent += event.key;
            } else if (event.key === 'Backspace') {
                commandSpan.textContent = commandSpan.textContent.slice(0, -1);
            }

            // Update cursor position
            const prompt = document.getElementById('prompt');
            cursor.style.marginLeft = (prompt.offsetWidth + commandSpan.offsetWidth) + 'px';
        });
    </script>
</body>
</html>
