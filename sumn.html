<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Haven Technologies (TM) - (1955-2009)</title>
    <link href="https://fonts.googleapis.com/css2?family=Consolas&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1f1f1f;
            color: purple;
            font-family: 'Consolas', monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #command-prompt {
            width: 800px;
            height: 600px;
            position: relative;
            border: 2px solid purple;
            overflow: hidden;
        }

        #header {
            background-color: #1f1f1f;
            color: purple;
            padding: 5px;
            font-size: 16px;
            text-align: center;
        }

        #output {
            padding: 10px;
            overflow-y: auto;
            height: calc(100% - 40px);
            box-sizing: border-box;
        }

        #input-container {
            display: flex;
        }

        #input {
            width: calc(100% - 20px);
            margin: 0;
            padding: 10px;
            border: none;
            background-color: transparent;
            color: purple;
            font-size: 16px;
            font-family: 'Consolas', monospace;
            outline: none;
        }

        #cursor {
            width: 10px;
            height: 20px;
            background-color: purple;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Add scan lines for realism and immersion */
        #command-prompt::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, #1f1f1f 1px, #1f1f1f 2px);
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="command-prompt">
        <div id="header">Harmony Haven Technologies (TM) - (1955-2009)</div>
        <div id="output"></div>
        <div id="input-container">
            <div id="cursor"></div>
            <input type="text" id="input" autofocus>
        </div>
    </div>
</body>
</html>
