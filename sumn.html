<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt</title>
    <link href="https://fonts.googleapis.com/css2?family=Consolas&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
            font-family: 'Consolas', monospace;
            color: purple;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #command-prompt {
            width: 800px;
            height: 600px;
            padding: 20px;
            box-sizing: border-box;
            border: 2px solid purple;
            position: relative;
        }

        #header {
            color: purple;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #output {
            height: 80%;
            overflow-y: auto;
            padding: 10px;
            background-color: black;
            border: 1px solid purple;
            border-radius: 5px;
        }

        #input-container {
            display: flex;
        }

        #input {
            flex: 1;
            border: none;
            background: transparent;
            color: purple;
            font-size: 16px;
            outline: none;
            caret-color: purple;
        }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: purple;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 0;
            }
            50%, 100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="command-prompt">
        <div id="header">Harmony Haven Technologies (TM) - (1955-2009)</div>
        <div id="output"></div>
        <div id="input-container">
            <div id="cursor"></div>
            <input id="input" type="text" autofocus>
        </div>
    </div>
</body>
</html>
