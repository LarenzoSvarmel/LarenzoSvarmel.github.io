<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector-Based Raycasting Demo</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="raycastingCanvas" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('raycastingCanvas');
    const ctx = canvas.getContext('2d');

    const screenWidth = 800;
    const screenHeight = 600;

    const sectors = [
      {
        linedefs: [
          { start: { x: 100, y: 100 }, end: { x: 200, y: 100 } },
          { start: { x: 200, y: 100 }, end: { x: 200, y: 200 } },
          { start: { x: 200, y: 200 }, end: { x: 100, y: 200 } },
          { start: { x: 100, y: 200 }, end: { x: 100, y: 100 } },
        ],
        floorHeight: 0,
        ceilingHeight: 100,
        floorColor: 'green',
        ceilingColor: 'blue',
      },
    ];

    const player = {
      x: 150,
      y: 150,
      angle: Math.PI / 4,
      fov: Math.PI / 3,
      speed: 2.5,
      rotationSpeed: 0.03,
    };

    function castRay(rayAngle) {
      const ray = {
        start: { x: player.x, y: player.y },
        angle: rayAngle,
        distance: 0,
        sector: null,
      };

      // Increment by small steps along the ray until a wall is hit
      while (ray.distance < 1000) {
        ray.distance += 1;

        ray.end = {
          x: ray.start.x + Math.cos(ray.angle) * ray.distance,
          y: ray.start.y + Math.sin(ray.angle) * ray.distance,
        };

        const intersectedSector = getIntersectedSector(ray);
        if (intersectedSector) {
          ray.sector = intersectedSector;
          break;
        }
      }

      return ray;
    }

    function getIntersectedSector(ray) {
      for (let i = 0; i < sectors.length; i++) {
        const sector = sectors[i];

        if (isInsideSector(ray.end.x, ray.end.y, sector)) {
          // Check if the ray intersects with any linedef in the sector
          for (let j = 0; j < sector.linedefs.length; j++) {
            const linedef = sector.linedefs[j];

            if (lineIntersects(ray.start, ray.end, linedef.start, linedef.end)) {
              return i; // Return the index of the intersected sector
            }
          }
        }
      }

      return null;
    }

    // ...

// ...

function isInsideSector(x, y, sectors) {
  for (let i = 0; i < sectors.length; i++) {
    const sector = sectors[i];

    if (isPointInsideSector(x, y, sector)) {
      return true;
    }
  }

  return false;
}

function isPointInsideSector(x, y, sector) {
  const linedefs = sector.linedefs;

  let windingNumber = 0;

  for (let i = 0; i < linedefs.length; i++) {
    const currentPoint = linedefs[i].start;
    const nextPoint = linedefs[(i + 1) % linedefs.length].start;

    if (currentPoint.y <= y) {
      if (nextPoint.y > y && isLeft(currentPoint, nextPoint, { x, y }) > 0) {
        windingNumber++;
      }
    } else if (nextPoint.y <= y && isLeft(currentPoint, nextPoint, { x, y }) < 0) {
      windingNumber--;
    }
  }

  return windingNumber !== 0;
}

function isLeft(p0, p1, p2) {
  return (p1.x - p0.x) * (p2.y - p0.y) - (p2.x - p0.x) * (p1.y - p0.y);
}

// ...

// Inside the handleInput function
function handleInput() {
  // Handle player input
  if (keys['ArrowLeft']) {
    player.angle -= player.rotationSpeed;
  }
  if (keys['ArrowRight']) {
    player.angle += player.rotationSpeed;
  }

  const moveStep = player.speed;

  // Check if the player is inside any sector
  if (isInsideSector(player.x, player.y, sectors)) {
    // Move forward and backward without rotating the camera angle
    if (keys['ArrowUp'] || keys['KeyW']) {
      const newX = player.x + Math.cos(player.angle) * moveStep;
      const newY = player.y + Math.sin(player.angle) * moveStep;

      if (!isInsideSector(newX, newY, sectors)) {
        player.x = newX;
        player.y = newY;
      }
    }
    if (keys['ArrowDown'] || keys['KeyS']) {
      const newX = player.x - Math.cos(player.angle) * moveStep;
      const newY = player.y - Math.sin(player.angle) * moveStep;

      if (!isInsideSector(newX, newY, sectors)) {
        player.x = newX;
        player.y = newY;
      }
    }
  }
}
// ...

// ...

    function lineIntersects(p1, q1, p2, q2) {
      const det = (q2.y - p2.y) * (q1.x - p1.x) - (q2.x - p2.x) * (q1.y - p1.y);

      if (det === 0) {
        return false;
      }

      const lambda = ((q1.x - p1.x) * (q2.y - p2.y) - (q1.y - p1.y) * (q2.x - p2.x)) / det;
      const gamma = ((p2.y - q2.y) * (q2.x - p1.x) + (q2.x - p2.x) * (q2.y - p1.y)) / det;

      return (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1);
    }

    const keys = {};

    document.addEventListener('keydown', (event) => {
      keys[event.code] = true;
    });

    document.addEventListener('keyup', (event) => {
      keys[event.code] = false;
    });

    function update() {
      // Update game logic here
      handleInput();
    }

    function draw() {
      // Draw the sector-based scene here
      ctx.clearRect(0, 0, screenWidth, screenHeight);

      // Draw sectors
      sectors.forEach((sector, index) => {
        ctx.fillStyle = sector.floorColor;
        ctx.fillRect(0, sector.floorHeight, screenWidth, sector.ceilingHeight - sector.floorHeight);

        ctx.fillStyle = sector.ceilingColor;
        ctx.fillRect(0, 0, screenWidth, sector.floorHeight);

        // Draw walls
        sector.linedefs.forEach((linedef) => {
          ctx.beginPath();
          ctx.moveTo(linedef.start.x, linedef.start.y);
          ctx.lineTo(linedef.end.x, linedef.end.y);
          ctx.strokeStyle = 'black';
          ctx.stroke();
        });
      });

      // Draw player
      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 5, 0, 2 * Math.PI);
      ctx.fill();

      // Draw rays
      const rays = [];
      for (let i = 0; i < screenWidth; i++) {
        const rayAngle = player.angle - player.fov / 2 + (i / screenWidth) * player.fov;
        const ray = castRay(rayAngle);
        rays.push(ray);
      }

      ctx.strokeStyle = 'yellow';
      rays.forEach((ray) => {
        ctx.beginPath();
        ctx.moveTo(ray.start.x, ray.start.y);
        ctx.lineTo(ray.end.x, ray.end.y);
        ctx.stroke();
      });
    }

    function handleInput() {
      // Handle player input
      if (keys['ArrowLeft']) {
        player.angle -= player.rotationSpeed;
      }
      if (keys['ArrowRight']) {
        player.angle += player.rotationSpeed;
      }

      const moveStep = player.speed;

      // Move forward and backward without rotating the camera angle
      if (keys['ArrowUp'] || keys['KeyW']) {
        const newX = player.x + Math.cos(player.angle) * moveStep;
        const newY = player.y + Math.sin(player.angle) * moveStep;

        if (!isInsideSector(newX, newY, sectors[player.sector])) {
          player.x = newX;
          player.y = newY;
        }
      }
      if (keys['ArrowDown'] || keys['KeyS']) {
        const newX = player.x - Math.cos(player.angle) * moveStep;
        const newY = player.y - Math.sin(player.angle) * moveStep;

        if (!isInsideSector(newX, newY, sectors[player.sector])) {
          player.x = newX;
          player.y = newY;
        }
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
