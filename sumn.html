<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt Simulation</title>
    <style>
        body {
            background-color: black;
            color: purple;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }

        #prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            height: 400px;
            border: 2px solid purple;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        #prompt-header {
            color: white;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #command-line {
            height: 80%;
            overflow-y: scroll;
            padding: 10px;
            box-sizing: border-box;
        }

        #input-line {
            display: flex;
        }

        #input-prefix {
            color: white;
            margin-right: 5px;
        }

        #input-text {
            flex-grow: 1;
            background-color: transparent;
            color: purple;
            border: none;
            outline: none;
        }

        /* CRT effect */
        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 0.95; }
            100% { opacity: 0.9; }
        }

        #prompt::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            box-shadow: 0 0 20px 10px rgba(128, 0, 128, 0.5);
            animation: flicker 0.2s infinite alternate;
        }
    </style>
</head>
<body>
    <div id="prompt">
        <div id="prompt-header">Harmony Haven Technologies (TM)</div>
        <div id="command-line">
            <div id="input-line">
                <div id="input-prefix">Administrator@HarmonyHaven:</div>
                <input id="input-text" type="text" autofocus>
            </div>
            <br>
            <!-- Preset commands -->
            <div>Sample Output: Welcome to Harmony Haven Technologies!</div>
            <div>Sample Output: Type 'help' for a list of available commands.</div>
        </div>
    </div>
</body>
</html>
