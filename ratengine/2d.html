<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Slime Rancher-Like Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #f0f0f0;
    }

    canvas {
      background-color: #87ceeb;
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    width: 30,
    height: 30,
    color: 'red',
    speed: 3,
    collectedSlimes: [],
    angle: 0,
  };

  const slimes = [];
  const slimeSize = 20;
  const keys = {};
  let collecting = false;

  // Create random slimes
  for (let i = 0; i < 10; i++) {
    slimes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      width: slimeSize,
      height: slimeSize,
      color: 'green',
      collected: false,
    });
  }

  function drawEntity(entity) {
    ctx.save();
    ctx.translate(entity.x, entity.y);
    ctx.rotate(entity.angle);
    ctx.fillStyle = entity.color;
    ctx.beginPath();
    ctx.arc(0, 0, entity.width / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    drawEntity(player);
  }

  function drawSlimes() {
    slimes.forEach(slime => {
      if (!slime.collected) {
        drawEntity(slime);
      }
    });
  }

  function movePlayer() {
    if (keys['w']) player.y -= player.speed;
    if (keys['a']) player.x -= player.speed;
    if (keys['s']) player.y += player.speed;
    if (keys['d']) player.x += player.speed;
  }

  function aimPlayer(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = event.clientX - rect.left;
    const mouseY = event.clientY - rect.top;
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    player.angle = angle;
  }

  function collectSlime() {
    slimes.forEach(slime => {
      if (!slime.collected) {
        const distX = slime.x - player.x;
        const distY = slime.y - player.y;
        const distance = Math.sqrt(distX * distX + distY * distY);

        if (distance < slimeSize + player.width) {
          player.collectedSlimes.push(slime);
          slime.collected = true;
        }
      }
    });
  }

  function throwSlime() {
    if (player.collectedSlimes.length > 0) {
      const slime = player.collectedSlimes.pop();
      const throwDistance = 100;
      slime.x = player.x + Math.cos(player.angle) * throwDistance;
      slime.y = player.y + Math.sin(player.angle) * throwDistance;
      slime.collected = false;
    }
  }

  // Event listeners for movement and collection
  window.addEventListener('keydown', (event) => {
    keys[event.key.toLowerCase()] = true;
  });

  window.addEventListener('keyup', (event) => {
    keys[event.key.toLowerCase()] = false;
  });

  canvas.addEventListener('mousemove', aimPlayer);

  canvas.addEventListener('mousedown', () => {
    collecting = true;
  });

  canvas.addEventListener('mouseup', () => {
    if (collecting && player.collectedSlimes.length === 0) {
      collectSlime();
    } else {
      throwSlime();
    }
    collecting = false;
  });

  // Game loop
  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    movePlayer();
    drawPlayer();
    drawSlimes();
    requestAnimationFrame(gameLoop);
  }

  gameLoop();
</script>

</body>
</html>
